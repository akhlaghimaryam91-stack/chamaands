<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود ادمین - چمان</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-wrap { width: 100%; max-width: 560px; padding: 1rem; }
    .login-wrap .form-card { padding: 3rem 2.5rem; }
    .login-wrap h2 { font-size: 2rem; }
    .login-wrap .form-group label { font-size: 1.1rem; }
    .login-wrap .form-group input {
      font-size: 1.15rem;
      padding: 1rem 1.1rem;
    }
    .login-wrap .btn {
      font-size: 1.15rem;
      padding: 1rem;
    }
  </style>
</head>
<body style="background:linear-gradient(135deg,var(--peach),var(--lavender));min-height:100vh;display:flex;align-items:center;justify-content:center">

<div class="login-wrap">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:4rem">🔐</div>
      <h2 style="margin-top:.5rem">پنل ادمین چمان</h2>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label>نام کاربری</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>رمز عبور</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
        ورود
      </button>
    </form>
  </div>
</div>

</body>
</html>
